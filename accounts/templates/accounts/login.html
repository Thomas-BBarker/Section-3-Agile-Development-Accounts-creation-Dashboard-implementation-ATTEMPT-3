<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Log In</title>
</head>

<body>
    <header>
        <h1>Log In</h1>

        <nav>
            <a href="{% url 'home:home' %}">
                Home
            </a>

            <a href="{% url 'accounts:register' %}">
                Register
            </a>
        </nav>
    </header>

    <main>
        {% if form.errors %}
            <p>
                Your username or password was incorrect.
            </p>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            {% if next %}
                <input
                    type="hidden"
                    name="next"
                    value="{{ next }}"
                >
            {% endif %}

            <button type="submit">
                Log in
            </button>
        </form>

        <p>
            Do not have an account?

            <a href="{% url 'accounts:register' %}">
                Create one
            </a>
        </p>
    </main>
</body>
</html>
